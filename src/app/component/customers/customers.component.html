<ng-container *ngIf="(customerState$ | async) as state" [ngSwitch]="state.dataState">
    <ng-container *ngSwitchCase="DataState.LOADED">
    <app-navbar [user]="state?.appData?.data?.user"></app-navbar>
       <section>
          <div class="container">
             <div class="row mt-3">
                <div class="col">
                   <h4 class="fw-bold text-start">Customers</h4>
                </div>
                <div class="col">
                   <h4 class="fw-bold text-end"><i style="cursor: pointer;color: green;font-size: 30px;" class="bi bi-file-earmark-excel"></i></h4>
                </div>
                <div class="col-xm-12">
                    <form #searchForm="ngForm" (submit)="searchCustomer(searchForm)" class="row g-3 float-start">
                        <div class="row">
                            <div class="col-sm">
                                <label for="name" class="visualy-hidden"></label>
                                <input type="text" ngModel name="name" #name class="form-control mb-1" placeholder="Customer name">
                            </div>
                            <div class="col-sm">
                                <button type="submit" class="btn btn-primary mb-1">Search Customers</button>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="col-xm-12">
                   <table class="table table-hover">
                      <thead>
                          <tr>
                            <th class="text-center" scope="col">ID</th>
                            <th scope="col">Photo</th>
                            <th scope="col">Name</th>
                            <th scope="col">Email</th>
                            <th scope="col">Phone</th>
                            <th scope="col">Status</th>
                            <th scope="col">Type</th>
                            <th scope="col">Action</th>
                          </tr>
                      </thead>
                      <tbody class="table-body">
                          <tr class="cell-1" *ngFor="let customer of state?.appData?.data?.customer.content">
                            <th class="text-center">{{ customer.id }}</th>
                            <td><img [src]="customer.imageUrl" width="42" height="42" class="rounded-circle" [alt]="customer.name"></td>
                            <td>{{ customer.name }}</td>
                            <td>{{ customer.email }}</td>                          
                            <td>{{ customer.phone }}</td>
                            <td>
                               <span class="badge" [ngClass]="[
                                 customer.status === 'ACTIVE' ? 'bg-success' : '',
                                 customer.status === 'INACTIVE' ? 'bg-warning' : '',
                                 customer.status === 'BANNED' ? 'bg-danger' : '',
                                 customer.status === 'PENDING' ? 'bg-primary' : '',
                               ]">
                                 {{ customer.status }}
                               </span>
                            </td>
                            <td>{{ customer.type }}</td>
                            <td>
                               <button type="button" (click)="selectedCustomer(customer)" class="btn btn-info">View</button>
                            </td>
                         </tr>
                      </tbody>
                  </table>
                  
                   <nav *ngIf="state?.appData?.data?.customer.content.length > 0" aria-label="Page navigation example">
                      <ul class="pagination justify-content-end">
                         <li [ngClass]="0 == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage(searchForm.value.name, 'backwards')" class="page-link">&laquo; Prev</a>
                         </li>
                         <li *ngFor="let page of [].constructor(state?.appData?.data?.customer.totalPages); let i = index" class="page-item pointer">
                            <a (click)="goToPage(searchForm.value.name, i)" [ngClass]="i == (currentPage$ | async) ? 'active' : ''" class="page-link">{{ i + 1 }}</a>
                         </li>
                         <li [ngClass]="(state?.appData?.data?.customer.totalPages - 1) == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage(searchForm.value.name, 'forwards')" class="page-link">Next &raquo;</a>
                         </li>
                      </ul>
                   </nav>
                </div>
             </div>
          </div>
       </section>
    </ng-container>
 </ng-container>
