<ng-container *ngIf="(serviceState$ | async) as state" [ngSwitch]="state.dataState">
    <ng-container *ngSwitchCase="DataState.LOADED">
    <app-navbar [user]="state?.appData?.data?.user"></app-navbar>
       <section>
          <div class="container">
             <div class="row mt-3">
                <div class="col">
                   <h4 class="fw-bold text-start">Services</h4>
                </div>
                <div class="col">
                   <h4 (click)="report()" class="fw-bold text-end"><i style="cursor: pointer;color: green;font-size: 30px;" class="bi bi-file-earmark-excel"></i></h4>
                </div>
                <div class="col-xm-12">
                   <table class="table table-hover">
                      <thead>
                          <tr>
                            <th scope="col">Service Number</th>
                            <th scope="col">Name</th>
                            <th scope="col">Price</th>
                            <th scope="col">Fee</th>
                            <th scope="col">Total</th>
                            <th scope="col">Action</th>
                          </tr>
                      </thead>
                      <tbody class="table-body">
                          <tr class="cell-1" *ngFor="let service of state?.appData?.data?.services?.content">
                            <th>{{ service.serviceCustomerNumber }}</th>
                            <td>{{ service.name }}</td>
                            <td>${{ service.price }}</td>
                            <td>${{ service.fee }}</td>
                            <td>${{ service.price + service.fee }}</td>
                            <td>
                               <button type="button" [routerLink]="['/services', service.id, service.serviceCustomerNumber]" class="btn btn-info">View</button>
                            </td>
                         </tr>
                      </tbody>
                  </table>
                  
                   <nav *ngIf="state?.appData?.data?.services.content.length > 0" aria-label="Page navigation example">
                      <ul class="pagination justify-content-end">
                         <li [ngClass]="0 == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage('backwards')" class="page-link">&laquo; Prev</a>
                         </li>
                         <li *ngFor="let page of state?.appData?.data?.services.totalPages | extractValue: 'number'; let i = index" class="page-item pointer">
                            <a (click)="goToPage(i)" [ngClass]="i == (currentPage$ | async) ? 'active' : ''" class="page-link">{{ i + 1 }}</a>
                         </li>
                         <li [ngClass]="(state?.appData?.data?.services.totalPages - 1) == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage('forwards')" class="page-link">Next &raquo;</a>
                         </li>
                      </ul>
                   </nav>
                </div>
             </div>
          </div>
       </section>
    </ng-container>
 </ng-container>
