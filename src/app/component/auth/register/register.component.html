<section *ngIf="(registerState$ | async) as state" [ngSwitch]="state.dataState">
    <div *ngIf="!state.registerSuccess" class="container">
      <div class="row justify-content-center my-5">
        <div class="col-md-6" style="margin-top: 50px;">
          <div class="card">
            <div class="card-body">
              <div class="text-center">
                <h2><i style="margin-right: 5px;" class="bi bi-safe"></i>BerboApp</h2>
                <!-- <p class="lead">Questions? Do not hesitate to contact us.</p> -->
                <h5 class="card-title mt-4 mb-5">Register</h5>
                <!-- <h6 class="card-subtitle mb-2 text-muted">Card subtitle</h6> -->
              </div>
              <div *ngIf="state.dataState === DataState.ERROR" class="alert alert-danger bg-danger text-light border-0 alert-dismissible fade show" role="alert">
                {{ state.error }}
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
              <form #registerForm="ngForm" (ngSubmit)="register(registerForm)">
                <div class="form-outline mb-4">
                    <label class="form-label">First Name</label>
                    <input [disabled]="state.dataState === DataState.LOADING" ngModel type="text" name="firstName" class="form-control" required>
                  </div>
                  <div class="form-outline mb-4">
                    <label class="form-label">Last Name</label>
                    <input [disabled]="state.dataState === DataState.LOADING" ngModel type="text" name="lastName" class="form-control" required>
                  </div>
                  <div class="form-outline mb-4">
                    <label class="form-label" for="email">Email Address</label>
                    <input [disabled]="state.dataState === DataState.LOADING" ngModel type="email" name="email" class="form-control" required>
                  </div>
                  <div class="form-outline mb-4">
                    <label class="form-label">Password</label>
                    <input [disabled]="state.dataState === DataState.LOADING" ngModel type="password" name="password" minlength="5" class="form-control" required>
                  </div>
                <div class="d-flex justify-content-center mb-4">
                  <button [disabled]="state.dataState === DataState.LOADING || registerForm.invalid || registerForm.pristine" type="submit" class="btn btn-primary">
                    <span *ngIf="state.dataState === DataState.LOADING" class="spinner-border spinner-border-sm" role="status" aria-hidden="true" style="margin-right: 5px;"></span>
                    <span *ngIf="state.dataState === DataState.LOADING">Saving...</span>
                    <span *ngIf="!(state.dataState === DataState.LOADING)">Register</span>
                  </button>
                </div>
              </form>
              <div class="row mb-4">
                <div class="col d-flex justify-content-center">
                  <a [ngStyle]="{'pointer-events': state.dataState === DataState.LOADING ? 'none' : ''}" routerLink="/login">Already have an account? Login!</a>
                </div>
                <div class="col">
                  <a [ngStyle]="{'pointer-events': state.dataState === DataState.LOADING ? 'none' : ''}" routerLink="/reset-password">Forgot password?</a>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Success screen -->
    <div *ngIf="state.registerSuccess" class="container">
        <!-- <div class="container"> -->
        <div class="row justify-content-center my-5">
          <div class="col-md-6" style="margin-top: 50px;">
            <div class="card">
              <div class="card-body">
                <div class="text-center">
                  <h2><i style="margin-right: 5px;" class="bi bi-safe"></i>BerboApp</h2>
                  <h5 class="card-title mt-4 mb-4">{{ state.message }}</h5>
                  <i class="bi bi-check-circle-fill" style="font-size: 30px;color: green;"></i>
                  <p class="mt-2" style="font-size: 20px;">Please access your Email confirm your account!.</p>
                </div>
                <div *ngIf="state.dataState === DataState.ERROR" class="alert alert-danger bg-danger text-light border-0 alert-dismissible fade show" role="alert">
                  {{ state.error }}
                  <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div class="row mb-4">
                  <div class="col d-flex justify-content-center">
                    <a routerLink="/login" style="color: #0D6EFD; text-decoration: underline; cursor: pointer;">Account Login</a>
                  </div>
                  <div class="col">
                    <a [ngStyle]="{'pointer-events': state.dataState === DataState.LOADING ? 'none' : ''}" (click)="createAnotherAccount()" style="color: #0D6EFD; text-decoration: underline; cursor: pointer;">Create another account</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  </section>
