<ng-container *ngIf="(invoiceState$ | async) as state" [ngSwitch]="state.dataState">
    <ng-container *ngSwitchCase="DataState.LOADED">
    <app-navbar [user]="state?.appData?.data?.user"></app-navbar>
       <section>
          <div class="container">
             <div class="row mt-3">
                <div class="col">
                   <h4 class="fw-bold text-start">Invoices</h4>
                </div>
                <div class="col">
                   <h4 class="fw-bold text-end"><i style="cursor: pointer;color: green;font-size: 30px;" class="bi bi-file-earmark-excel"></i></h4>
                </div>
                <div class="col-xm-12">
                   <table class="table table-hover">
                      <thead>
                          <tr>
                            <th scope="col">Invoice Number</th>
                            <th scope="col">Services</th>
                            <th scope="col">Status</th>
                            <th scope="col">Date</th>
                            <th scope="col">Total</th>
                            <th scope="col">Action</th>
                          </tr>
                      </thead>
                      <tbody class="table-body">
                          <tr class="cell-1" *ngFor="let invoice of state?.appData?.data?.invoices?.content">
                            <th>{{ invoice.invoiceNumber }}</th>
                            <td>{{ invoice.services }}</td>
                            <td>
                                <span class="badge" [ngClass]="[
                                  invoice.status === 'PENDING' ? 'bg-warning' : '',
                                  invoice.status === 'PAID' ? 'bg-success' : '',
                                  invoice.status === 'OVERDUE' ? 'bg-danger' : '',
                                  invoice.status === 'CANCELLED' ? 'bg-primary' : '',
                                ]">
                                  {{ invoice.status }}
                                </span>
                             </td>
                            <td>{{ invoice.createdAt | date: 'MMMM d, y' }}</td>
                            <td>${{ invoice.total }}</td>
                            <td>
                               <button type="button" [routerLink]="['/invoices', invoice.id, invoice.invoiceNumber]" class="btn btn-info">View</button>
                            </td>
                         </tr>
                      </tbody>
                  </table>
                  
                   <nav *ngIf="state?.appData?.data?.invoices.content.length > 0" aria-label="Page navigation example">
                      <ul class="pagination justify-content-end">
                         <li [ngClass]="0 == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage(searchForm.value.name, 'backwards')" class="page-link">&laquo; Prev</a>
                         </li>
                         <li *ngFor="let page of [].constructor(state?.appData?.data?.invoices.totalPages); let i = index" class="page-item pointer">
                            <a (click)="goToPage(searchForm.value.name, i)" [ngClass]="i == (currentPage$ | async) ? 'active' : ''" class="page-link">{{ i + 1 }}</a>
                         </li>
                         <li [ngClass]="(state?.appData?.data?.invoices.totalPages - 1) == (currentPage$ | async) ? 'disabled' : ''" class="page-item pointer">
                            <a (click)="goToNextPage(searchForm.value.name, 'forwards')" class="page-link">Next &raquo;</a>
                         </li>
                      </ul>
                   </nav>
                </div>
             </div>
          </div>
       </section>
    </ng-container>
 </ng-container>
